<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | MarineOPS</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #0a1628 0%, #1e5799 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .login-box {
      background: white;
      border-radius: 16px;
      overflow: hidden;
      width: 420px;
      box-shadow: 0 25px 60px rgba(0,0,0,0.4);
    }

    .login-header {
      background: #0a1628;
      padding: 32px;
      text-align: center;
    }

    .login-header .icon { font-size: 48px; }
    .login-header h1 {
      font-size: 22px;
      font-weight: 800;
      color: #00a8b5;
      margin-top: 8px;
    }
    .login-header p {
      font-size: 13px;
      color: rgba(255,255,255,0.5);
      margin-top: 4px;
    }

    .login-body { padding: 32px; }

    .form-group { margin-bottom: 16px; }
    .form-label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #334155;
      margin-bottom: 6px;
    }
    .form-control {
      width: 100%;
      padding: 10px 14px;
      border: 1.5px solid #e2e8f0;
      border-radius: 8px;
      font-size: 14px;
      font-family: inherit;
      color: #0f172a;
      transition: border-color 0.2s;
    }
    .form-control:focus {
      outline: none;
      border-color: #1e5799;
      box-shadow: 0 0 0 3px rgba(30,87,153,0.1);
    }

    .btn-login {
      width: 100%;
      padding: 12px;
      background: #1e5799;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      margin-top: 8px;
    }
    .btn-login:hover { background: #1a4a82; }

    .alert-error {
      background: #fee2e2;
      color: #991b1b;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 13px;
      margin-bottom: 16px;
    }

    .demo-box {
      margin-top: 20px;
      padding: 14px;
      background: #f8fafc;
      border-radius: 8px;
      border: 1px solid #e2e8f0;
    }
    .demo-box h4 {
      font-size: 11px;
      font-weight: 700;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 8px;
    }
    .demo-row {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      color: #334155;
      padding: 3px 0;
    }
    .demo-row strong { color: #0f172a; }
  </style>
</head>
<body>
  <div class="login-box">
    <div class="login-header">
      <div class="icon">⚓</div>
      <h1>MarineOPS</h1>
      <p>Maritime Operations & Compliance System</p>
    </div>

    <div class="login-body">
      {% if messages %}
        {% for message in messages %}
        <div class="alert-error">{{ message }}</div>
        {% endfor %}
      {% endif %}

      <form method="post">
        {% csrf_token %}
        <div class="form-group">
          <label class="form-label">Username</label>
          <input type="text" name="username" class="form-control"
                 placeholder="Enter username" required autofocus>
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <input type="password" name="password" class="form-control"
                 placeholder="Enter password" required>
        </div>
        <button type="submit" class="btn-login">🔐 Sign In</button>
      </form>

      <div class="demo-box">
        <h4>Demo Credentials</h4>
        <div class="demo-row">
          <span>👔 Admin:</span>
          <span><strong>admin</strong> / admin123</span>
        </div>
        <div class="demo-row">
          <span>⚓ Crew:</span>
          <span><strong>crewmember1</strong> / Test1234!</span>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
